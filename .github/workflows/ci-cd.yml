name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Lint
        run: bun lint
      
      - name: Typecheck
        run: bun typecheck
      
      - name: Build
        run: bun build
      
      - name: Test (if applicable)
        run: bun test || echo "No tests configured"
      
      - name: Deploy (stub)
        if: github.ref == 'refs/heads/main'
        run: echo "Deployment step would go here - configure your CD target"